name: dispute handler

# Když někdo otevře issue s labelem `dispute` (z webu nebo manuálně), přidá
# triáž label, automatickou odpověď s linky na methodology a postup. Issues
# se pak řeší ručně — workflow pouze připraví kontext pro rychlou odpověď.
#
# Per methodology/governance.md vrstva 6: public dispute mechanismus.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: ${{ github.event.label.name == 'dispute' || contains(github.event.issue.labels.*.name, 'dispute') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Add triage label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE" --add-label triage --repo "${{ github.repository }}"

      - name: Auto-comment with methodology links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          BODY="Díky za dispute! 🙏

Tento issue automaticky dostal label \`triage\`. Než se k němu dostanu ručně, krátký kontext:

**Než budeš pokračovat — podívej se prosím sem:**
- [\`methodology/pillars.md\`](../blob/main/methodology/pillars.md) — co každý pilíř měří, kdy patří/nepatří k pillaru
- [\`methodology/severity_rubric.md\`](../blob/main/methodology/severity_rubric.md) — kalibrace severity 1–5 s ČR příklady
- [\`methodology/governance.md\`](../blob/main/methodology/governance.md) — proč nepřepisujeme severity ručně po publikaci, ale řešíme to skrz dispute log

**Co dispute typicky vede k:**
- Pokud najdu jasnou chybu klasifikace → ruční edit \`data/events/<week>.json\` s commitem; recompute-scores workflow přepočítá timeline
- Pokud jde o sporný judgment call → necháme původní klasifikaci, ale zaznamenám rozpor pro budoucí prompt-tuning
- Pokud disagreement odhalí systematický problém → otevřu issue na úpravu rubric/promptu

Odpověď typicky do týdne."
          gh issue comment "$ISSUE" --body "$BODY" --repo "${{ github.repository }}"
