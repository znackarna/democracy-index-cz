# Zdroje pro týdenní pipeline.
#
# Kategorie:
#   czech_media   — česká redakční média (zpravodajství, investigace)
#   open_data     — strukturovaná data státu (parlament, rejstříky, soudy)
#   watchdog      — neziskové watchdog organizace
#   international — mezinárodní instituce a indexy
#
# Typ:
#   rss   — RSS/Atom feed, čte se přes rss-parser
#   api   — strukturované JSON API
#   html  — fallback HTML scrape, používat jen kde RSS chybí
#
# URL je odkaz, ze kterého pipeline čte. Pole `homepage` je info pro lidi.
# Pole `notes` je volitelný komentář pro reviewery a budoucí Claude session.
#
# POZOR: některé URL jsou orientační a vyžadují ověření při implementaci
# fetch-sources.ts. Před prvním produkčním během každý feed otestovat ručně.

version: 1
sources:
  # ============================================================
  # Česká redakční média
  # ============================================================
