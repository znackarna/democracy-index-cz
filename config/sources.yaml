    category: international
    type: html
    url: https://commission.europa.eu/strategy-and-policy/policies/justice-and-fundamental-rights/upholding-rule-law/rule-law/rule-law-mechanism_en
    homepage: https://commission.europa.eu/

  - id: eclr
    name: European Court of Human Rights — ČR
    category: international
    type: html
    url: https://hudoc.echr.coe.int/
    homepage: https://hudoc.echr.coe.int/
