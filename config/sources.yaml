    name: Deník N
    category: czech_media
    type: rss
    url: https://denikn.cz/feed/
    homepage: https://denikn.cz/
    notes: Předplatné u některých článků; pipeline pracuje s titulkem a perexem.

  - id: irozhlas
    name: iROZHLAS
    category: czech_media
    type: rss
