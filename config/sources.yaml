    homepage: https://www.irozhlas.cz/

  - id: ct24
    name: ČT24
    category: czech_media
    type: rss
    url: https://ct24.ceskatelevize.cz/rss
    homepage: https://ct24.ceskatelevize.cz/
    notes: URL ověřit, ČT občas přesouvá feed.

  - id: hn
    name: Hospodářské noviny
    category: czech_media
    type: rss
    url: https://hn.cz/?m=rss
    homepage: https://hn.cz/

  - id: aktualne
    name: Aktuálně.cz
    category: czech_media
