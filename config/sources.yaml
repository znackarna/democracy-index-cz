    notes: Investigativní novinařina, často pomalejší kadence ale velmi vysoká relevance.

  - id: a2larm
    name: A2larm
    category: czech_media
    type: rss
    url: https://a2larm.cz/feed/
    homepage: https://a2larm.cz/

  - id: seznam-zpravy
    name: Seznam Zprávy
    category: czech_media
    type: rss
    url: https://www.seznamzpravy.cz/rss
    homepage: https://www.seznamzpravy.cz/

  # ============================================================
  # Otevřená data státu
  # ============================================================
  - id: hlidac-statu
    name: Hlídač státu — sponzoring
    category: open_data
    type: api
    url: https://api.hlidacstatu.cz/api/v2/sponzoring
    homepage: https://www.hlidacstatu.cz/
    notes: |
      Adapter v src/lib/hlidac.ts (fetchPartyDonationsAsArticles). Vyžaduje
      HLIDAC_API_KEY env var (zdarma po registraci). Fan-out přes 9 hlavních
      CZ stran (POLITICAL_PARTIES), threshold 100 000 Kč, posledních 30 dní
      (configurable přes windowDays).
      TODO: ověřit IČO pro SPD (22875327) a Motoristé (22878660) — vrací prázdno.

  - id: hlidac-smlouvy
    name: Hlídač státu — smlouvy s issues
    category: open_data
    type: api
    url: https://api.hlidacstatu.cz/api/v2/smlouvy/hledat
    homepage: https://www.hlidacstatu.cz/
    notes: |
      Adapter v src/lib/hlidac.ts (fetchWatchlistSmlouvyAsArticles). Vrací
      smlouvy z Registru smluv, kde watchlist entita (AGROFERT, MAFRA — viz
      WATCHLIST_ENTITIES) figuruje jako strana A KDE Hlídač označil anomálii
      (issues.length > 0). Issue typy: nečitelnost, nulová hodnota, pozdní
      zveřejnění, stejné strany apod.

  - id: hlidac-dotace
    name: Hlídač státu — dotace pro watchlist
    category: open_data
    type: api
    url: https://api.hlidacstatu.cz/api/v2/dotace/hledat
    homepage: https://www.hlidacstatu.cz/
    notes: |
      Adapter v src/lib/hlidac.ts (fetchWatchlistDotaceAsArticles). Vrací
      dotace přijaté watchlist entitami, filtrované podle Hlídač modifiedDate
      v okně. Threshold ≥ 100 000 Kč. Pozn.: Hlídač refresheuje dotace
      v dávkách (typicky měsíčně), takže výstup je nepravidelný — některé
      týdny 0, jiné spousta najednou. Klasifikátor s tím počítá.

  - id: psp-cz
    name: Poslanecká sněmovna PČR
    category: open_data
    type: html
    url: https://www.psp.cz/sqw/ischuze.sqw?o=10
    homepage: https://www.psp.cz/
    notes: |
      PSP nemá RSS feed (probed 2026-04-28). Adapter v src/lib/psp.ts parsuje
      přehled schůzí (table na ischuze.sqw?o=10) — vrací jednu RawArticle za
      schůzi končící v okně. Status "Přerušeno" (přerušená schůze) je hlavní
      governance signál. Drill-down do per-schůze tisků je iter 2.

  - id: senat-cz
    name: Senát PČR
    category: open_data
    type: html
    url: https://www.senat.cz/
    homepage: https://www.senat.cz/

  - id: ustavni-soud
    name: Ústavní soud ČR
    category: open_data
    type: rss
    url: https://www.usoud.cz/rss
    homepage: https://www.usoud.cz/
    notes: |
      Oficiální RSS feed (nedokumentovaný, ale stabilní — vrací 30 nejnovějších
      položek: nálezy, přehledy jednání pléna i senátů, tiskové zprávy.
      Klíčové pro pillar judicial — ÚS rozhodnutí často mají strukturální
      dopad na ústavní pořádek.

  - id: nejvyssi-soud
    name: Nejvyšší soud
    category: open_data
    type: html
    url: https://www.nsoud.cz/
    homepage: https://www.nsoud.cz/

  - id: nejvyssi-spravni-soud
    name: Nejvyšší správní soud
    category: open_data
    type: html
    url: https://www.nssoud.cz/
    homepage: https://www.nssoud.cz/

  # ============================================================
  # Watchdogy
  # ============================================================
  - id: ti-cz
    name: Transparency International ČR
    category: watchdog
    type: rss
    url: https://www.transparency.cz/feed/
    homepage: https://www.transparency.cz/

  - id: rekonstrukce-statu
    name: Rekonstrukce státu
    category: watchdog
    type: html
    url: https://www.rekonstrukcestatu.cz/aktuality
    homepage: https://www.rekonstrukcestatu.cz/

  # Iuridicum Remedium dropped 2026-04-29 — RSS feed permanentně vrací HTTP 500.
  # Přidat zpět, až opraví (jejich obsah je relevantní pro pillar civil/digital rights).

  - id: frank-bold
    name: Frank Bold
    category: watchdog
    type: html
    url: https://frankbold.org/
    homepage: https://frankbold.org/

  # ============================================================
  # Zahraniční média (cross-check perspektiva)
  # ============================================================
  # Záměrně jen 5 zdrojů — accent na quality nad quantity. Klasifikátor
  # je vícejazyčný (Sonnet 4.6), výstup zůstává v češtině per prompt rule.
  # Filtr na CZ relevanci dělá pre-filter — většina zahraničních zpráv
  # se netýká české demokracie a propadne tam.

  - id: politico-eu
    name: POLITICO Europe
    category: international
    type: rss
    url: https://www.politico.eu/feed/
    homepage: https://www.politico.eu/
    notes: |
      Joint venture US Politico + Axel Springer (DE). Pan-European focus s
      strong CEE coverage. Profesionální political desk, často exkluzivní
      reporting o EU institucionálních hrách týkajících se ČR.

  - id: bbc-europe
    name: BBC News Europe
    category: international
    type: rss
    url: https://feeds.bbci.co.uk/news/world/europe/rss.xml
    homepage: https://www.bbc.com/news/world/europe
    notes: |
      Public broadcaster (UK). Široce uznávaný neutral standard, BBC editorial
      guidelines vyžadují due impartiality. CZ pokrývá hlavně při významných
      událostech (volby, ústavní krize, big scandals).

  - id: euronews
    name: Euronews
    category: international
    type: rss
    url: https://www.euronews.com/rss?level=theme&name=news
    homepage: https://www.euronews.com/
    notes: |
      Pan-European TV/web outlet (vlastnictví NBC + Naguib Sawiris a Mediaset).
      Multijazyčný, široké pokrytí EU událostí. Užitečný pro events, kde CZ
      hraje roli v evropském kontextu (NATO, EU policy, sankce).

  - id: visegrad-insight
    name: Visegrad Insight
    category: international
    type: rss
    url: https://visegradinsight.eu/feed/
    homepage: https://visegradinsight.eu/
    notes: |
      Niche policy outlet zaměřený výhradně na V4 (CZ + SK + PL + HU).
      Vydává Res Publica Foundation (PL). Nejvyšší CZ-relevance per item ze
      všech zahraničních zdrojů — analytic depth o CEE politice.

  - id: brno-daily
    name: Brno Daily
    category: international
    type: rss
    url: https://brnodaily.com/feed/
    homepage: https://brnodaily.com/
    notes: |
      English-language news o ČR (založen v Brně, postupně rozšiřuje na
      celou ČR). Vzácná „outside-in" perspektiva v angličtině pro čtenáře,
      co nečtou česky. Menší kapacita, ale on-topic.

